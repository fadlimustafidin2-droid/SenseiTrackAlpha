<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelola Indikator — SenseiTrack</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logosenseitrack.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Poppins', 'sans-serif'] },
        colors: {
          primary: { DEFAULT: '#2563EB', light: '#3B82F6', dark: '#1D4ED8' },
          secondary: { DEFAULT: '#14B8A6', light: '#2DD4BF', dark: '#0D9488' },
        },
        boxShadow: {
          soft: '0 10px 30px -10px rgba(15,23,42,0.12)',
          glow: '0 10px 25px -6px rgba(37,99,235,0.35)',
        },
      } },
    };
  </script>
  <link rel="stylesheet" href="css/style.css" />

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>if (!App.requireAdmin()) { document.write(''); }</script>
</head>
<body class="bg-surface dark:bg-[#0B1220] font-sans text-ink dark:text-slate-100">

  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-64 -translate-x-full lg:translate-x-0 bg-white dark:bg-[#0B1220] border-r border-slate-100 dark:border-slate-800/60 flex flex-col">
      <div class="h-16 flex items-center gap-2.5 px-5 border-b border-slate-100 dark:border-slate-800/60 flex-shrink-0">
        <img src="assets/images/logosenseitrack.svg" class="w-8 h-8" alt="" />
        <span class="font-bold text-lg tracking-tight">SenseiTrack</span>
        <span class="role-badge">Admin</span>
        <button id="sidebarCloseBtn" class="ml-auto lg:hidden text-slate-400"><span class="material-symbols-rounded">close</span></button>
      </div>
      <nav class="flex-1 overflow-y-auto scrollbar-thin px-3 py-4 space-y-1">
        <a href="admin-dashboard.html" class="sidebar-link"><span class="material-symbols-rounded">admin_panel_settings</span><span data-i18n="nav.admindash">Dashboard Admin</span></a>
        <a href="manage-indicators.html" class="sidebar-link active"><span class="material-symbols-rounded icon-fill">checklist</span><span data-i18n="nav.manageindicators">Kelola Indikator</span></a>
        <div class="h-px bg-slate-100 dark:bg-slate-800 my-2"></div>
        <a href="dashboard.html" class="sidebar-link"><span class="material-symbols-rounded">person</span>Dashboard Guru</a>
        <a href="profile.html" class="sidebar-link"><span class="material-symbols-rounded">badge</span><span data-i18n="nav.profile">Profil</span></a>
        <a href="settings.html" class="sidebar-link"><span class="material-symbols-rounded">settings</span><span data-i18n="nav.settings">Pengaturan</span></a>
        <a href="about.html" class="sidebar-link"><span class="material-symbols-rounded">info</span><span data-i18n="nav.about">Tentang</span></a>
      </nav>
      <div class="p-3 border-t border-slate-100 dark:border-slate-800/60 flex-shrink-0">
        <button class="js-logout sidebar-link w-full text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 hover:text-red-600">
          <span class="material-symbols-rounded">logout</span><span data-i18n="topbar.logout">Keluar</span>
        </button>
      </div>
    </aside>
    <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden"></div>

    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- TOPBAR -->
      <header class="h-16 flex items-center justify-between px-4 sm:px-6 border-b border-slate-100 dark:border-slate-800/60 bg-white/80 dark:bg-[#0B1220]/80 backdrop-blur sticky top-0 z-20 flex-shrink-0">
        <div class="flex items-center gap-3">
          <button id="sidebarOpenBtn" class="lg:hidden text-slate-500 dark:text-slate-300"><span class="material-symbols-rounded">menu</span></button>
          <h1 class="font-semibold text-lg">Kelola Indikator</h1>
        </div>
        <button id="resetDefaultBtn" class="btn btn-ghost text-xs px-3 py-2 text-slate-400"><span class="material-symbols-rounded" style="font-size:16px">restart_alt</span>Kembalikan Default</button>
      </header>

      <main class="flex-1 overflow-y-auto scrollbar-thin p-4 sm:p-6 lg:p-8 page-enter">
        <div class="max-w-3xl mx-auto">
          <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">Perubahan di sini langsung berlaku untuk penilaian baru. Riwayat penilaian yang sudah ada tidak akan berubah.</p>

          <div id="categoryList" class="space-y-4 mb-6"></div>

          <div class="surface-card p-5">
            <p class="font-semibold mb-3">Tambah Kategori Baru</p>
            <div class="grid grid-cols-1 sm:grid-cols-[1fr_1fr_auto] gap-3">
              <input type="text" id="newCategoryLabel" class="field-input" placeholder="Nama kategori, contoh: Kompetensi Digital" />
              <input type="text" id="newCategoryIcon" class="field-input" placeholder="Nama ikon Material Symbols (opsional)" />
              <button id="addCategoryBtn" class="btn btn-primary px-5">Tambah</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/manage-indicators.js"></script>
</body>
</html>
