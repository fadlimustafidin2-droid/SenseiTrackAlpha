<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil — SenseiTrack</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logosenseitrack.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Poppins', 'sans-serif'] },
        colors: {
          primary: { DEFAULT: '#2563EB', light: '#3B82F6', dark: '#1D4ED8' },
          secondary: { DEFAULT: '#14B8A6', light: '#2DD4BF', dark: '#0D9488' },
        },
        boxShadow: {
          soft: '0 10px 30px -10px rgba(15,23,42,0.12)',
          glow: '0 10px 25px -6px rgba(37,99,235,0.35)',
        },
      } },
    };
  </script>
  <link rel="stylesheet" href="css/style.css" />

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>if (!App.requireAuth()) { document.write(''); }</script>
</head>
<body class="bg-surface dark:bg-[#0B1220] font-sans text-ink dark:text-slate-100">

  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-64 -translate-x-full lg:translate-x-0 bg-white dark:bg-[#0B1220] border-r border-slate-100 dark:border-slate-800/60 flex flex-col">
      <div class="h-16 flex items-center gap-2.5 px-5 border-b border-slate-100 dark:border-slate-800/60 flex-shrink-0">
        <img src="assets/images/logosenseitrack.svg" class="w-8 h-8" alt="" />
        <span class="font-bold text-lg tracking-tight">SenseiTrack</span>
        <button id="sidebarCloseBtn" class="ml-auto lg:hidden text-slate-400"><span class="material-symbols-rounded">close</span></button>
      </div>
      <nav class="flex-1 overflow-y-auto scrollbar-thin px-3 py-4 space-y-1">
        <a href="dashboard.html" class="sidebar-link"><span class="material-symbols-rounded">dashboard</span><span data-i18n="nav.dashboard">Dashboard</span></a>
        <a href="assessment.html" class="sidebar-link"><span class="material-symbols-rounded">edit_note</span><span data-i18n="nav.assessment">Self Assessment</span></a>
        <a href="history.html" class="sidebar-link"><span class="material-symbols-rounded">history</span><span data-i18n="nav.history">Riwayat</span></a>
        <a href="profile.html" class="sidebar-link active"><span class="material-symbols-rounded icon-fill">person</span><span data-i18n="nav.profile">Profil</span></a>
        <a href="settings.html" class="sidebar-link"><span class="material-symbols-rounded">settings</span><span data-i18n="nav.settings">Pengaturan</span></a>
        <a href="about.html" class="sidebar-link"><span class="material-symbols-rounded">info</span><span data-i18n="nav.about">Tentang</span></a>
      </nav>
      <div class="p-3 border-t border-slate-100 dark:border-slate-800/60 flex-shrink-0">
        <button class="js-logout sidebar-link w-full text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 hover:text-red-600">
          <span class="material-symbols-rounded">logout</span><span data-i18n="topbar.logout">Keluar</span>
        </button>
      </div>
    </aside>
    <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden"></div>

    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- TOPBAR -->
      <header class="h-16 flex items-center justify-between px-4 sm:px-6 border-b border-slate-100 dark:border-slate-800/60 bg-white/80 dark:bg-[#0B1220]/80 backdrop-blur sticky top-0 z-20 flex-shrink-0">
        <div class="flex items-center gap-3">
          <button id="sidebarOpenBtn" class="lg:hidden text-slate-500 dark:text-slate-300"><span class="material-symbols-rounded">menu</span></button>
          <h1 class="font-semibold text-lg">Profil</h1>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto scrollbar-thin p-4 sm:p-6 lg:p-8 page-enter">
        <div class="max-w-3xl mx-auto">

          <!-- Avatar card -->
          <div class="surface-card p-6 sm:p-8 mb-5 flex flex-col sm:flex-row items-center gap-6">
            <div class="relative flex-shrink-0">
              <span class="relative w-24 h-24 rounded-full overflow-hidden flex items-center justify-center bg-primary/10 text-primary font-bold text-2xl avatar-ring block">
                <img id="avatarImg" class="hidden absolute inset-0 w-full h-full object-cover" src="" alt="Foto profil" />
                <img id="avatarDefaultImg" class="absolute inset-0 w-full h-full object-cover" src="assets/icons/defaultteacheravatar.png" alt="Foto profil default" />
              </span>
              <button id="avatarUploadBtn" class="hidden absolute bottom-0 right-0 w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center shadow-glow border-2 border-white dark:border-[#111C31]" aria-label="Ubah foto profil">
                <span class="material-symbols-rounded" style="font-size:16px">photo_camera</span>
              </button>
              <input type="file" id="avatarInput" accept="image/*" class="hidden" />
            </div>
            <div class="text-center sm:text-left flex-1 min-w-0">
              <h2 class="text-xl font-bold" id="profileNameDisplay">-</h2>
              <p class="text-sm text-slate-400" id="profileSubjectDisplay">-</p>
              <p class="text-xs text-slate-400 mt-1" id="profileSchoolDisplay">-</p>
            </div>
            <div class="flex-shrink-0 flex gap-2">
              <button id="editProfileBtn" class="btn btn-outline px-4 py-2 text-sm"><span class="material-symbols-rounded" style="font-size:18px">edit</span>Edit Profil</button>
              <button id="cancelEditBtn" class="hidden btn btn-ghost px-4 py-2 text-sm">Batal</button>
              <button id="saveProfileBtn" class="hidden btn btn-primary px-4 py-2 text-sm"><span class="material-symbols-rounded" style="font-size:18px">check</span>Simpan</button>
            </div>
          </div>

          <form id="profileForm">
            <!-- Personal info -->
            <div class="surface-card p-6 mb-5">
              <p class="divider-label mb-4">Informasi Pribadi</p>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="sm:col-span-2">
                  <label class="field-label">Nama Lengkap</label>
                  <input type="text" id="fieldName" class="field-input" disabled />
                </div>
                <div>
                  <label class="field-label">Email</label>
                  <input type="email" id="fieldEmail" class="field-input" disabled />
                </div>
                <div>
                  <label class="field-label">No. Telepon</label>
                  <input type="text" id="fieldPhone" class="field-input" disabled />
                </div>
                <div>
                  <label class="field-label">Tanggal Lahir</label>
                  <input type="date" id="fieldBirthDate" class="field-input" disabled />
                </div>
                <div>
                  <label class="field-label">Jenis Kelamin</label>
                  <select id="fieldGender" class="field-input" disabled>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- School info -->
            <div class="surface-card p-6 mb-5">
              <p class="divider-label mb-4">Informasi Sekolah</p>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="sm:col-span-2">
                  <label class="field-label">Nama Sekolah</label>
                  <input type="text" id="fieldSchool" class="field-input" disabled />
                </div>
                <div>
                  <label class="field-label">NIP / NUPTK</label>
                  <input type="text" id="fieldNip" class="field-input font-tabular" disabled />
                </div>
                <div>
                  <label class="field-label">Mata Pelajaran</label>
                  <input type="text" id="fieldSubject" class="field-input" disabled />
                </div>
                <div>
                  <label class="field-label">Jenjang</label>
                  <select id="fieldLevel" class="field-input" disabled>
                    <option>PAUD / TK</option>
                    <option>SD / Sederajat</option>
                    <option>SMP / Sederajat</option>
                    <option>SMA / Sederajat</option>
                  </select>
                </div>
                <div>
                  <label class="field-label">Tanggal Bergabung</label>
                  <input type="date" id="fieldJoinDate" class="field-input" disabled />
                </div>
              </div>
            </div>
          </form>

        </div>
      </main>
    </div>
  </div>

  <script src="js/profile.js"></script>
</body>
</html>
